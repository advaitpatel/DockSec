name: Mirror to OWASP Repository

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  mirror:
    runs-on: ubuntu-latest
    name: Mirror repository to OWASP

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.OWASP_MIRROR_TOKEN }}

      - name: Mirror to OWASP repository
        env:
          OWASP_TOKEN: ${{ secrets.OWASP_MIRROR_TOKEN }}
        run: |
          set -e

          if [ -z "$OWASP_TOKEN" ]; then
            echo "ERROR: OWASP_MIRROR_TOKEN secret is not set."
            exit 1
          fi

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git config --global credential.helper store
          echo "https://${OWASP_TOKEN}@github.com" > ~/.git-credentials

          if ! git ls-remote https://github.com/OWASP/www-project-docksec.git HEAD > /dev/null 2>&1; then
            echo "ERROR: Cannot access OWASP repository. Check token scope and write access."
            rm ~/.git-credentials
            exit 1
          fi

          git remote add owasp https://github.com/OWASP/www-project-docksec.git
          git fetch owasp

          # Use HEAD:main so this works whether triggered by a branch push or a
          # tag push. Tag pushes leave the checkout in detached HEAD state, which
          # means a local 'main' ref does not exist and 'git push owasp main' fails.
          git push owasp HEAD:main --force

          TAG_COUNT=$(git tag | wc -l)
          if [ "$TAG_COUNT" -gt 0 ]; then
            git push owasp --tags --force
          fi

          rm ~/.git-credentials

          OWASP_HEAD=$(git ls-remote https://github.com/OWASP/www-project-docksec.git HEAD | cut -f1)
          LOCAL_HEAD=$(git rev-parse HEAD)
          echo "Local HEAD: $LOCAL_HEAD"
          echo "OWASP HEAD: $OWASP_HEAD"

          if [ "$LOCAL_HEAD" = "$OWASP_HEAD" ]; then
            echo "Mirror verified: OWASP repo is in sync."
          else
            echo "WARNING: commits differ — OWASP may have additional commits."
          fi
